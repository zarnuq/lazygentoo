---
#############################################
# acpid: suspend on lid close (laptops only; runit+seatd has no logind to do it)
#############################################
- name: configure acpid lid-suspend (laptop only)
  when: is_laptop | bool
  block:
    - name: install acpid
      command: '{{ in_chroot }} "emerge --quiet-build sys-power/acpid"'
    - name: acpid lid event (acpid reads /etc/acpi/events only at startup)
      copy:
        dest: "{{ chroot_dir }}/etc/acpi/events/lid"
        mode: "0644"
        content: |
          event=button/lid.*
          action=/etc/acpi/lid.sh

    - name: acpid lid action — suspend to RAM when lid reads closed
      copy:
        dest: "{{ chroot_dir }}/etc/acpi/lid.sh"
        mode: "0755"
        content: |
          #!/bin/sh
          # bare kernel suspend, no screen lock; add a locker above this line if wanted.
          # lid node name (e.g. LID0) varies by hardware — glob covers it.
          grep -q closed /proc/acpi/button/lid/*/state && echo mem > /sys/power/state

    - name: enable acpid service
      file:
        src: /etc/sv/acpid
        dest: "{{ chroot_dir }}/etc/service/acpid"
        state: link
        force: yes
