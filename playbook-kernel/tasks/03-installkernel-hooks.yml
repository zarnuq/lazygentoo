---
##########################################
# install kernel-install hooks + configs #
##########################################

- name: installkernel USE flags
  copy:
    dest: /etc/portage/package.use/zz-playbook-kernel-installkernel
    mode: "0644"
    content: "sys-kernel/installkernel dracut -grub -systemd-boot\n"

- name: Remove legacy file from earlier playbook runs
  file:
    path: /etc/portage/package.use/installkernel
    state: absent

- name: emerge installkernel
  command: emerge --quiet-build --newuse sys-kernel/installkernel
  register: ik
  changed_when: "'>>> Installing' in ik.stdout or '>>> Merging' in ik.stdout"

- file: { path: /etc/dracut.conf.d, state: directory, mode: "0755" }

- copy:
    dest: /etc/dracut.conf.d/10-playbook-kernel-omit.conf
    mode: "0644"
    content: 'omit_dracutmodules+=" systemd systemd-initrd systemd-networkd dracut-systemd i18n "'

- name: force crypt modules
  copy:
    dest: /etc/dracut.conf.d/20-playbook-kernel-crypt.conf
    mode: "0644"
    content: 'add_dracutmodules+=" crypt dm rootfs-block "'
  when: luks_detected

- name: remove crypt config (no LUKS)
  file: { path: /etc/dracut.conf.d/20-playbook-kernel-crypt.conf, state: absent }
  when: not luks_detected

- copy:
    dest: /etc/kernel/install.conf
    mode: "0644"
    content: |
      layout=uki
      initrd_generator=dracut
      uki_generator=ukify

- copy:
    dest: /etc/kernel/uki.conf
    mode: "0644"
    content: |
      [UKI]
      Cmdline=@/etc/kernel/cmdline
      OSRelease=@/etc/os-release

- copy: { dest: /etc/kernel/cmdline, mode: "0644", content: "{{ root_cmdline | trim }}\n" }
- copy: { dest: /etc/kernel/entry-token, mode: "0644", content: "gentoo\n" }

- copy:
    dest: /etc/kernel/uki.env
    mode: "0644"
    content: |
      LABEL_PREFIX="{{ uki_label_prefix }}"
      KEEP_N_KERNELS={{ keep_n_kernels }}
      PROMOTE_NEW_TO_DEFAULT={{ 'true' if promote_new_to_default else 'false' }}

- name: install hook scripts
  copy:
    src: "hooks/{{ item }}"
    dest: "/etc/kernel/install.d/{{ item }}"
    mode: "0755"
  loop:
    - 95-efibootmgr-register.install
    - 96-prune-old-ukis.install

- name: shadow installkernel's grub hook with a no-op
  copy:
    dest: /etc/kernel/install.d/91-grub-mkconfig.install
    mode: "0755"
    content: "#!/bin/sh\nexit 0\n"
