---
# MAIN CONFIG 

###############
# SINGLE BOOT #
###############

# Target disk
target_disk: "/dev/sda"

# Partition sizes in MB (for single boot)
efi_size_mib: 1028   # EFI System Partition /boot
swap_size_mib: 16000 # set to 0 to skip swap

#############
# DUAL BOOT #
#############

# Option for dual boot (must have partitions made already!)
dual_boot: false 

# Partitions that will be written to (for dual boot only)
efi_part_override:  "/dev/nvme0n1p4"    # Linux's ESP (FAT32, mounted at /boot)
swap_part_override: "/dev/nvme0n1p5"    # swap (omit / leave "" if swap_size_mib=0)
root_part_override: "/dev/nvme0n1p6"    # Linux root (ext4)

######################
# ENCRYPTION OPTIONS #
######################

fde_enable: false 
luks_name: "cryptroot"
luks_cipher: "aes-xts-plain64"
luks_key_size: 512
luks_hash: "sha512"
luks_pbkdf: "argon2id"
encrypt_swap: true

####################
# BOOTLOADER (UKI) #
####################

# Boots a UKI directly via efibootmgr (no grub). Secure Boot key
# enrollment is handled separately by playbook-kernel.
uki_label_prefix: "Gentoo"    # efibootmgr entry label prefix
keep_n_kernels: 3             # keep newest N UKIs on the ESP
promote_new_to_default: true  # set the new UKI as BootOrder[0]

#########################
# LOCALE, TIMEZONE, ETC #
#########################
hostname: "gentoo"
timezone: "America/New_York"
locales:
  - "en_US.UTF-8 UTF-8"
default_locale: "en_US.utf8"
keymap: "us"

#########
# USERS #
#########
root_password: "changeme"

create_user: true
user_name: "miles"
user_password: "changeme"
user_groups:
  - wheel
  - audio
  - video
  - input
  - usb
  - plugdev
  - seat
user_shell: "/bin/zsh"     # zsh is baked into the stage4; /etc/zsh/zshenv baked too
# SSH public keys: drop them in files/authorized_keys (gitignored, one key per
# line). See files/authorized_keys.example. Install skips it if the file is absent.

#########################
# STAGE4 SOURCE/PROFILE #
#########################

# Personalized catalyst stage4 tarball (bakes portage config, @world/base+desktop,
# runit, overlays). Local path on the controller (relative to playbook-base/) OR an
# https:// URL. This is what tasks/02-stage3.yml extracts.
stage4_tarball: "files/stage4-amd64-v3-runit-20260706.tar.bz2"


# Mirror for GENTOO_MIRRORS (consumed by templates/make.conf.host.j2).
gentoo_mirror: "https://distfiles.gentoo.org/releases/amd64/autobuilds"

####################
# COMPILER OPTIONS #
####################

# NOTE: COMMON_FLAGS, the global USE list, and ACCEPT_KEYWORDS/LICENSE are BAKED
# into the stage4 make.conf (canonical copy lives in the version-controlled
# catalyst config). Only per-host build parallelism remains here, consumed via
# install.yml -> templates/make.conf.host.j2.
makeopts_jobs: 0          # 0 = auto (use detected vCPUs)
emerge_jobs: 0            # 0 = ceil(vCPUs/2)

###################
# SERVICE OPTIONS #
###################

# networking options
network_stack: "dhcpcd"   # networkmanager | dhcpcd

# NOTE: runit_services, binhost_packages, kernel_build_deps, and base_packages are
# all BAKED into the stage4 (their canonical lists live in the catalyst spec's
# stage4/packages + the runit overlay). Removed from here to avoid stale duplicates.
