---
##############################################################################
# Gentoo desktop layer (dotfiles, apps, themes, shell, nix, power)
# ansible-playbook -i inventory.ini desktop.yml
#
# NOTE: the WM (river + reach), greetd + its config, tuigreet, kitty, rofi-wayland,
# nftables + ruleset, xdg-desktop-portal(-wlr), and noto fonts are all BAKED into
# the stage4 tarball. This layer only adds the non-baked apps/dotfiles/theming and
# the host-specific greetd NVIDIA env tweak.
##############################################################################

# dotfiles repo and dir to stow
dotfiles_repo: "https://github.com/zarnuq/dotfiles"
dotfiles_branch: "main"
stow_packages:
  - de

# bg repo
wallpapers_repo: "https://github.com/zarnuq/bgs"
wallpapers_branch: "main"

# pweq (PipeWire EQ configurator) repo
pweq_repo: "https://github.com/zarnuq/pweq"
pweq_branch: "main"

# nix channel and home-manager branch
nix_channel: "nixpkgs-unstable"
home_manager_branch: "master"

# dirs to make so stow functions correctly
home_premkdir:
  - .config/zsh
  - .local/share/icons
  - .local/src
  - .local/bin
  - .zen
  - Documents

# audio deps
audio_packages:
  - media-video/pipewire
  - media-video/wireplumber
  - media-sound/pavucontrol

# list of apps to make my "de"
apps_packages:
  # shell + CLI tooling
  - app-shells/bash-completion
  - app-shells/fzf
  - app-shells/zoxide
  - sys-apps/ripgrep
  - sys-apps/fd
  - app-misc/jq
  - app-text/tree
  - app-misc/fastfetch
  - sys-process/btop
  - sys-process/htop
  - app-misc/tmux
  - sys-apps/pciutils
  - sys-apps/usbutils
  - app-misc/yazi
  - dev-util/github-cli
  - app-portage/eix

  # editors
  - app-editors/neovim

  # Wayland ecosystem (river) — rofi-wayland + xdg-desktop-portal(-wlr) are BAKED
  - gui-apps/mako
  - x11-misc/gammastep
  - gui-apps/qt6ct
  - x11-themes/kvantum
  - gui-apps/grim
  - gui-apps/slurp
  - gui-apps/swaylock
  - gui-apps/wl-clipboard
  - app-misc/brightnessctl      # ::guru
  - gui-apps/wlr-randr          # ::guru
  - gui-apps/eww                # ::guru
  - gui-apps/awww               # ::guru
  - gui-apps/satty              # ::guru
  - gui-apps/wl-clip-persist    # ::guru

  # media
  - media-video/mpv
  - media-sound/mpd
  - media-sound/mpc
  - media-sound/playerctl
  - media-sound/mpd-mpris       # ::guru
  - media-sound/rmpc            # ::guru
  - media-gfx/imagemagick
  - media-gfx/loupe

  # terminals + docs (kitty is BAKED)
  - app-text/zathura
  - app-text/zathura-pdf-poppler

  # fonts (noto + noto-emoji are BAKED; CJK is not)
  - media-fonts/noto-cjk

  # programming
  - dev-lang/lua
  - dev-lua/luarocks

  # python
  - dev-python/icalendar

  # network / VPN / storage (nftables is BAKED)
  - net-vpn/openvpn
  - sys-fs/udisks
  - net-p2p/syncthing

  # browsers
  - www-client/zen-browser-bin   # ::edgets

  # messaging
  - net-im/signal-desktop-bin

power_packages:
  - sys-power/acpid       # ACPI events -> lid-close suspend
  - sys-power/tlp         # CPU/PCIe/USB power tuning (intel_pstate + amd_pstate)
  - gui-apps/swayidle     # idle hook -> swaylock (wire into your river autostart)
power_packages_intel:
  - sys-power/thermald    # Intel-only thermal daemon

power_services:
  - acpid
  - tlp
power_services_intel:
  - thermald

# theme fetch versions and names
theme_assets:
  jetbrains_mono_version: "2.304"
  nerd_fonts_version: "3.4.0"
  bibata_version: "2.0.7"
  bibata_variant: "Bibata-Modern-Classic"   # Modern-{Classic,Ice,Amber} or Original-*
  catppuccin_gtk_version: "1.0.3"
  catppuccin_flavor: "mocha"                # latte | frappe | macchiato | mocha
  catppuccin_accent: "mauve"                # rosewater flamingo pink mauve red maroon peach yellow green teal sky sapphire blue lavender
  papirus_version: "20250501"
