---
##############################################################################
# Gentoo desktop install (greetd,dwl,dotfiles,apps,themes,shell,nix,firewalls)
# ansible-playbook -i inventory.ini install.yml
##############################################################################

greetd_cmd: "dbus-run-session /home/{{ user_name }}/.local/src/dwl/dwl"

# dotfiles repo and dir to stow
dotfiles_repo: "https://github.com/zarnuq/dotfiles"
dotfiles_branch: "main"
stow_packages:
  - de

# bg repo
wallpapers_repo: "https://github.com/zarnuq/bgs"
wallpapers_branch: "main"

# nix channel and home-manager branch
nix_channel: "nixpkgs-unstable"
home_manager_branch: "master"

# dirs to make so stow functions correctly
home_premkdir:
  - .config/zsh
  - .local/share/icons
  - .local/src
  - .local/bin
  - .zen
  - Documents

# dwl deps to build and make cmds (all .local/src)
dwl_build_dirs:
  - { name: dwl,        build_args: "clean all" }
  - { name: dwlb,       build_args: "clean all" }
  - { name: someblocks, build_args: "" }

# dwl deps
dwl_build_deps:
  - "=gui-libs/wlroots-0.18*"
  - dev-libs/libinput
  - x11-libs/libxkbcommon
  - x11-libs/pixman
  - dev-libs/wayland
  - dev-libs/wayland-protocols
  - x11-base/xwayland
  - media-libs/fcft
  - dev-libs/tllist

# audio deps
audio_packages:
  - media-video/pipewire
  - media-video/wireplumber
  - media-sound/pavucontrol

# list of apps to make my "de"
apps_packages:
  # shell + CLI tooling
  - app-shells/zsh
  - app-shells/bash-completion
  - app-shells/fzf
  - app-shells/zoxide
  - sys-apps/ripgrep
  - sys-apps/fd
  - app-misc/jq
  - app-text/tree
  - app-misc/fastfetch
  - sys-process/btop
  - sys-process/htop
  - app-misc/tmux
  - sys-apps/pciutils
  - sys-apps/usbutils
  - app-misc/yazi
  - dev-util/github-cli
  - app-portage/eix

  # editors
  - app-editors/neovim

  # Wayland + dwl ecosystem
  - gui-apps/mako
  - x11-misc/gammastep
  - gui-apps/qt6ct
  - x11-themes/kvantum
  - gui-apps/grim
  - gui-apps/slurp
  - gui-apps/swaylock
  - gui-apps/wl-clipboard
  - app-misc/brightnessctl      # ::guru
  - gui-apps/wlr-randr          # ::guru
  - gui-apps/rofi-wayland       # ::guru
  - gui-apps/eww                # ::guru
  - gui-apps/awww               # ::guru
  - gui-apps/satty              # ::guru
  - gui-apps/wl-clip-persist    # ::guru
  - sys-apps/xdg-desktop-portal
  - gui-libs/xdg-desktop-portal-wlr

  # media
  - media-video/mpv
  - media-sound/mpd
  - media-sound/mpc
  - media-sound/playerctl
  - media-sound/mpd-mpris       # ::guru
  - media-sound/rmpc            # ::guru
  - media-gfx/imagemagick
  - media-gfx/loupe

  # terminals + docs
  - x11-terms/kitty
  - app-text/zathura
  - app-text/zathura-pdf-poppler

  # fonts
  - media-fonts/noto-cjk
  - media-fonts/noto-emoji

  # programming
  - dev-lang/lua
  - dev-lua/luarocks

  # python
  - dev-python/icalendar

  # network / VPN / firewall / storage
  - net-vpn/openvpn
  - net-firewall/ufw
  - sys-fs/udisks
  - net-p2p/syncthing

  # browsers
  - www-client/zen-browser-bin   # ::edgets

  # messaging
  - net-im/signal-desktop-bin

# firewall ports to open (to be nix like)
ufw_allowed_tcp_ports:
  - 22
ufw_allowed_udp_ports: []

# theme fetch versions and names
theme_assets:
  jetbrains_mono_version: "2.304"
  nerd_fonts_version: "3.4.0"
  bibata_version: "2.0.7"
  bibata_variant: "Bibata-Modern-Classic"   # Modern-{Classic,Ice,Amber} or Original-*
  catppuccin_gtk_version: "1.0.3"
  catppuccin_flavor: "mocha"                # latte | frappe | macchiato | mocha
  catppuccin_accent: "mauve"                # rosewater flamingo pink mauve red maroon peach yellow green teal sky sapphire blue lavender
  papirus_version: "20250501"
