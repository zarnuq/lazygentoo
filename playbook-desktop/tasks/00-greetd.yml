---
###################
# install greeter #
###################
- name: install greetd, tuigreet
  command: emerge --quiet-build --noreplace gui-libs/greetd gui-apps/tuigreet
  async: 3600
  poll: 30

- name: make sure greetd config dir exists
  file:
    path: /etc/greetd
    state: directory
    mode: "0755"

- name: write greetd config
  template:
    src: greetd-config.toml.j2
    dest: /etc/greetd/config.toml
    mode: "0644"

- name: ensure tuigreet cache dir exists
  file:
    path: /var/cache/tuigreet
    state: directory
    mode: "0755"

- name: chown tuigreet cache dir
  command: chown greetd:greetd /var/cache/tuigreet
  changed_when: false

- name: add greetd user to groups
  command: gpasswd -a greetd {{ item }}
  loop:
    - seat
    - tty
    - input
  register: greetd_groups
  changed_when: "'Adding user' in (greetd_groups.stdout | default(''))"

# wlroots 0.18 needs GBM backend + GLVND dispatch + SW cursor (NVIDIA KMS has no
# HW cursor planes). greetd reads /etc/environment via pam_env before launching the
# session, so these reach dwl without needing a login shell.
- name: write NVIDIA Wayland env vars (NVIDIA GPU only)
  blockinfile:
    path: /etc/environment
    create: true
    marker: "# {mark} NVIDIA WAYLAND"
    block: |
      GBM_BACKEND=nvidia-drm
      __GLX_VENDOR_LIBRARY_NAME=nvidia
      WLR_NO_HARDWARE_CURSORS=1
  when: "'nvidia' in video_cards"

- name: Enable greetd as a runit service (symlink into /service)
  file:
    src: /etc/sv/greetd
    dest: /service/greetd
    state: link
    follow: false
    force: yes
