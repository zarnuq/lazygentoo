---
##############################################################################
# laptop power tuning: acpid lid-suspend + TLP (both Intel & AMD) + thermald on
##############################################################################
- name: probe for ACPI lid switch (laptop detection)
  shell: "ls /proc/acpi/button/lid/*/state 2>/dev/null | head -1"
  register: lid_state
  changed_when: false
  failed_when: false

- name: set is_laptop fact
  set_fact:
    is_laptop: "{{ lid_state.stdout | trim | length > 0 }}"

- name: laptop power tuning + idle-lock tooling
  when: is_laptop | bool
  block:
    - name: probe cpu vendor (thermald is Intel-only; TLP covers both vendors)
      shell: "grep -m1 vendor_id /proc/cpuinfo | awk '{print $3}'"
      register: cpu_vendor
      changed_when: false
      failed_when: false

    - name: set cpu_is_intel fact
      set_fact:
        cpu_is_intel: "{{ cpu_vendor.stdout | trim == 'GenuineIntel' }}"

    # Hardcoded, NOT user-configurable: a laptop always gets acpid + tlp; an Intel
    # laptop additionally gets thermald. Desktops never enter this block, so they
    # never install or enable any of it.
    - name: compute effective power package + service lists (Intel adds thermald)
      set_fact:
        power_packages_eff: "{{ ['sys-power/acpid', 'sys-power/tlp'] + (['sys-power/thermald'] if cpu_is_intel else []) }}"
        power_services_eff: "{{ ['acpid', 'tlp'] + (['thermald'] if cpu_is_intel else []) }}"

    - name: install power packages (+ Intel-only on Intel)
      command: >
        emerge --quiet-build --noreplace
        --autounmask=y --autounmask-write=y --autounmask-continue=y --autounmask-license=y
        {{ power_packages_eff | join(' ') }}
      async: 3600
      poll: 30

    # NOTE: acpid lid config (/etc/acpi/events/lid + /etc/acpi/lid.sh, suspend on
    # lid close since runit+seatd has no logind) is now BAKED into the stage4
    # overlay (etc/acpi/) — static, and harmless on desktops (acpid isn't enabled
    # there). Only the laptop-conditional package install + service enable remain.

    #########################################
    # enable services (live runsvdir picks these up immediately)
    #########################################
    - name: enable power runit services
      file:
        src: "/etc/sv/{{ item }}"
        dest: "/service/{{ item }}"
        state: link
        follow: false
        force: yes
      loop: "{{ power_services_eff }}"
