---
############################################
# install bin kernel + initramfs, build a UKI, register it with efibootmgr, and microcodes
############################################
- name: check UEFI
  stat:
    path: /sys/firmware/efi
  register: efi_present

- name: fail if not UEFI
  fail:
  when: not efi_present.stat.exists

- name: create /etc/kernel/install.d + /etc/dracut.conf.d in chroot
  file:
    path: "{{ chroot_dir }}{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /etc/kernel/install.d
    - /etc/dracut.conf.d

- name: make root kernel cmdline
  set_fact:
    root_cmdline: >-
      {{ ('rd.luks.uuid=' ~ luks_uuid ~ ' ') if fde_enable else '' }}root=UUID={{ root_uuid }} rootfstype={{ root_fs }} rw quiet loglevel=3 preempt=full init=/usr/bin/runit-init{{ ' nvidia-drm.modeset=1' if 'nvidia' in video_cards else '' }}

- name: write kernel cmdline
  copy:
    dest: "{{ chroot_dir }}/etc/kernel/cmdline"
    mode: "0644"
    content: "{{ root_cmdline | trim }}\n"

- name: write dracut cmdline
  copy:
    dest: "{{ chroot_dir }}/etc/dracut.conf.d/cmdline.conf"
    mode: "0644"
    content: "kernel_cmdline=\"{{ root_cmdline | trim }}\"\n"

- name: write dracut firmware/early-microcode config
  template:
    src: dracut-firmware.conf.j2
    dest: "{{ chroot_dir }}/etc/dracut.conf.d/firmware.conf"
    mode: "0644"

- name: write dracut lean config (hostonly + zstd + omit unused modules; runit, no systemd/network)
  copy:
    dest: "{{ chroot_dir }}/etc/dracut.conf.d/00-lean.conf"
    mode: "0644"
    content: |
      hostonly="yes"
      compress="zstd"
      # safety net so a chroot-built hostonly initramfs can always mount root: force
      # the root fs + disk controller in. Guarded by a module-check so a custom kernel
      # that builds these BUILTIN doesn't break dracut (can't force a builtin driver;
      # it's already in the kernel). Modular gentoo-kernel-bin still gets the net.
      _k="${kernel:-$(uname -r)}"
      case "$(modinfo -k "$_k" -F filename {{ root_fs }} 2>/dev/null)" in *.ko*) filesystems+=" {{ root_fs }} " ;; esac
      case "$(modinfo -k "$_k" -F filename {{ root_disk_driver }} 2>/dev/null)" in *.ko*) force_drivers+=" {{ root_disk_driver }} " ;; esac
      omit_dracutmodules+=" systemd systemd-initrd dracut-systemd systemd-ask-password network network-manager ifcfg plymouth lvm mdraid dmraid multipath nfs iscsi nbd i18n "

- name: write dracut crypt config (fde_enable=true)
  copy:
    dest: "{{ chroot_dir }}/etc/dracut.conf.d/crypt.conf"
    mode: "0644"
    content: |
      add_dracutmodules+=" crypt dm rootfs-block "
  when: fde_enable

- name: install cryptsetup ahead of kernel build (FDE only)
  command: >
    {{ in_chroot }}
    "emerge --quiet-build sys-fs/cryptsetup"
  when: fde_enable

- name: install firmware, UKI toolchain, installkernel, kernel build deps
  command: >
    {{ in_chroot }}
    "emerge --quiet-build --newuse sys-kernel/linux-firmware sys-kernel/installkernel sys-kernel/dracut sys-apps/systemd-utils sys-boot/efibootmgr {{ kernel_build_deps | join(' ') }}"
  async: 3600
  poll: 30

- name: install intel microcode
  command: '{{ in_chroot }} "emerge --quiet-build sys-firmware/intel-microcode"'
  when: cpu_microcode == "intel"

- name: install kernel source tree (USE=symlink -> /usr/src/linux)
  command: '{{ in_chroot }} "emerge --quiet-build --noreplace sys-kernel/gentoo-sources"'
  async: 1800
  poll: 30

# Ship a validated .config (files/kernel/config). It builds storage/fs/crypt and
# the EFI framebuffer BUILTIN (nvme, ext4, dm-crypt, fb_efi/sysfb) so the kernel
# sees the disk and shows the LUKS prompt with no initramfs gymnastics. olddefconfig
# absorbs any version drift between the shipped config and the emerged source.
- name: install kernel .config
  copy:
    src: kernel/config
    dest: "{{ chroot_dir }}/usr/src/linux/.config"
    mode: "0644"

- name: adapt .config to the emerged source (non-interactive)
  command: '{{ in_chroot }} "make -C /usr/src/linux olddefconfig"'

- name: compile the kernel
  command: '{{ in_chroot }} "make -C /usr/src/linux {{ makeopts_effective }}"'
  async: 3600
  poll: 30

# INSTALL_MOD_STRIP=1 strips DWARF debug info from each .ko at install time.
# DEBUG_INFO=y is needed to *generate* BTF, but the leftover DWARF in the modules
# is dead weight at boot (~592M -> ~70M module tree). strip --strip-debug keeps the
# .BTF section, so BTF/CO-RE still works; it just sheds the DWARF that was bloating
# the hostonly initramfs (and thus the UKI's .initrd section).
- name: install kernel modules
  command: '{{ in_chroot }} "make -C /usr/src/linux INSTALL_MOD_STRIP=1 modules_install"'
  async: 1800
  poll: 30

- name: write kernel-install / UKI config
  copy:
    dest: "{{ chroot_dir }}/etc/kernel/{{ item.f }}"
    mode: "0644"
    content: "{{ item.c }}"
  loop:
    - { f: install.conf, c: "layout=uki\ninitrd_generator=dracut\nuki_generator=ukify\n" }
    - { f: uki.conf,     c: "[UKI]\nCmdline=@/etc/kernel/cmdline\nOSRelease=@/etc/os-release\n" }
    - { f: entry-token,  c: "gentoo\n" }
    - { f: uki.env,      c: "LABEL_PREFIX=\"{{ uki_label_prefix }}\"\nKEEP_N_KERNELS={{ keep_n_kernels }}\nPROMOTE_NEW_TO_DEFAULT={{ 'true' if promote_new_to_default else 'false' }}\n" }
  loop_control:
    label: "{{ item.f }}"

- name: install kernel-install hook scripts
  copy:
    src: "hooks/{{ item }}"
    dest: "{{ chroot_dir }}/etc/kernel/install.d/{{ item }}"
    mode: "0755"
  loop:
    - 95-efibootmgr-register.install
    - 96-prune-old-ukis.install

# Mask the systemd microcode plugins (symlink->/dev/null is kernel-install's disable
# convention). dracut early_microcode=yes already bundles the host microcode into the
# UKI; left enabled these drop a redundant {amd,intel}-uc.img into /boot — harmless but
# it breaks UKI-only /boot (hits AMD hosts, where the ucode legitimately exists).
- name: disable redundant systemd microcode install.d plugins (keep /boot UKI-only)
  file:
    src: /dev/null
    dest: "{{ chroot_dir }}/etc/kernel/install.d/{{ item }}"
    state: link
    force: true
  loop:
    - 35-amd-microcode-systemd.install
    - 35-intel-microcode-systemd.install

# Feed the bzImage straight from the source tree (NOT /boot) so kernel-install
# builds+registers the UKI without ever dropping a loose vmlinuz/System.map/config
# in /boot. dracut bundles the (now host-only) microcode into the UKI. Net: /boot
# holds only EFI/Linux/<token>-<kver>.efi.
- name: build + register UKI (kernel-install) from the source bzImage
  command: >
    {{ in_chroot }}
    "kver=$(make -s -C /usr/src/linux kernelrelease); kernel-install add \"$kver\" /usr/src/linux/arch/x86/boot/bzImage"
