---
##################################################
# Gentoo desktop layer (greetd + dwl + pipeWire)
#   ansible-playbook -i inventory.ini desktop.yml
##################################################

- name: Install desktop layer
  hosts: gentoo
  gather_facts: yes
  become: yes
  any_errors_fatal: true

  vars_files:
    - ../playbook-base/config.yml
    - config.yml

  tasks:
    - import_tasks: tasks/00-greetd.yml
    - import_tasks: tasks/01-dotfiles.yml
    - import_tasks: tasks/02-dwl.yml
    - import_tasks: tasks/03-audio.yml
    - import_tasks: tasks/04-apps.yml
    - import_tasks: tasks/05-theme.yml
    - import_tasks: tasks/06-shell.yml
    - import_tasks: tasks/07-nix.yml
    - import_tasks: tasks/08-firewall.yml
    - import_tasks: tasks/09-power.yml
