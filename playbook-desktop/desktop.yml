---
##################################################
# Gentoo desktop layer (river baked; apps + dotfiles + theming + pipewire)
#   ansible-playbook -i inventory.ini desktop.yml
##################################################

- name: Install desktop layer
  hosts: gentoo
  gather_facts: yes
  become: yes
  any_errors_fatal: true

  vars_files:
    - ../playbook-base/config.yml
    - config.yml

  tasks:
    # Re-detect GPU (base preflight facts don't carry over to this play)
    - name: identify GPU
      shell: "lspci -nn 2>/dev/null | grep -iE 'vga|3d|display' || true"
      register: gpu_lspci
      changed_when: false

    - name: set video_cards fact
      set_fact:
        video_cards: >-
          {%- set out = gpu_lspci.stdout | default('') -%}
          {%- set parts = [] -%}
          {%- if 'AMD' in out or 'ATI' in out or 'Advanced Micro Devices' in out -%}{%- set _ = parts.extend(['amdgpu', 'radeonsi']) -%}{%- endif -%}
          {%- if 'Intel' in out -%}{%- set _ = parts.append('intel') -%}{%- endif -%}
          {%- if 'NVIDIA' in out -%}{%- set _ = parts.append('nvidia') -%}{%- endif -%}
          {{ parts | join(' ') }}

    - import_tasks: tasks/00-greetd.yml   # host tweaks only (install/config baked)
    - import_tasks: tasks/01-dotfiles.yml
    - import_tasks: tasks/02-audio.yml
    - import_tasks: tasks/03-apps.yml
    - import_tasks: tasks/04-theme.yml
    - import_tasks: tasks/05-nix.yml
    - import_tasks: tasks/06-power.yml
