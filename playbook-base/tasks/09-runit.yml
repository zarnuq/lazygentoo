---
#############################################
# install runit, udevd, moving over startup scripts, shutdown wrappers 
#############################################
- name: install runit + udevd
  command: >
    {{ in_chroot }}
    "emerge --quiet-build --noreplace sys-process/runit sys-apps/systemd-utils"
  async: 1800
  poll: 30

- name: remove sysvinit
  command: '{{ in_chroot }} "emerge --quiet-build -C sys-apps/sysvinit"'
  failed_when: false

- name: mask sys-apps/sysvinit
  copy:
    dest: "{{ chroot_dir }}/etc/portage/package.mask/sysvinit"
    mode: "0644"
    content: "sys-apps/sysvinit\n"

- name: symlink /sbin/init → /usr/bin/runit-init
  file:
    src: /usr/bin/runit-init
    dest: "{{ chroot_dir }}/sbin/init"
    state: link
    force: yes

- name: ensure /etc/runit and /etc/runit/rc exist
  file:
    path: "{{ chroot_dir }}/etc/runit/rc"
    state: directory
    mode: "0755"

#############################################
# moving over startup scripts, shutdown wrappers 
#############################################
- name: install runit functions helper
  copy:
    src: runit/functions
    dest: "{{ chroot_dir }}/etc/runit/functions"
    mode: "0644"

- name: install runit crypt.awk helper
  copy:
    src: runit/crypt.awk
    dest: "{{ chroot_dir }}/etc/runit/crypt.awk"
    mode: "0644"

- name: discover stage 1,3 rc scripts
  find:
    paths: "{{ playbook_dir }}/files/runit/rc"
    patterns: "*.sh"
  delegate_to: localhost
  become: no
  register: runit_rc_files

- name: move /etc/runit/rc/*.sh
  copy:
    src: "runit/rc/{{ item.path | basename }}"
    dest: "{{ chroot_dir }}/etc/runit/rc/{{ item.path | basename }}"
    mode: "0755"
  loop: "{{ runit_rc_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: write /etc/runit/rc.conf
  copy:
    dest: "{{ chroot_dir }}/etc/runit/rc.conf"
    mode: "0644"
    content: |
      HOSTNAME="{{ hostname }}"
      TIMEZONE="{{ timezone }}"
      HARDWARECLOCK="UTC"
      KEYMAP="{{ keymap }}"

# Override the package's stage 2 + 3 wrappers so runit supervises and shuts down
# /service — sv's compiled-in default dir — instead of /etc/service. This is
# what lets bare `sv <name>` work everywhere with no env (shell, doas, ansible).
# files/runit/{2,3} are the stock Gentoo wrappers copied verbatim with only the
# service-dir path swapped to /service. Stage 1 and rc.sh have no service-dir
# reference, so they stay stock (package-provided).
- name: override runit stage 2 + 3 to supervise /service
  copy:
    src: "runit/{{ item }}"
    dest: "{{ chroot_dir }}/etc/runit/{{ item }}"
    mode: "0755"
  loop: ["2", "3"]

#############################################
# move over services files
#############################################
- name: discover service definitions
  find:
    paths: "{{ playbook_dir }}/files/runit/sv"
    file_type: directory
    recurse: no
  delegate_to: localhost
  become: no
  register: runit_sv_dirs

- name: move /etc/sv/* files
  copy:
    src: "runit/sv/{{ item.path | basename }}/"
    dest: "{{ chroot_dir }}/etc/sv/{{ item.path | basename }}/"
    mode: preserve
    local_follow: no
  loop: "{{ runit_sv_dirs.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: override getty-tty{{ item }}/run with setsid wrapper (runit PID-1 fix)
  copy:
    dest: "{{ chroot_dir }}/etc/sv/getty-tty{{ item }}/run"
    mode: "0755"
    content: |
      #!/bin/sh
      exec setsid -w /sbin/agetty 38400 tty{{ item }} linux
  loop: [1, 2, 3, 4, 5, 6]

- name: create /var/log/runit/*/ files
  file:
    path: "{{ chroot_dir }}/var/log/runit/{{ item.path | basename }}"
    state: directory
    mode: "0755"
  loop: "{{ runit_sv_dirs.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

# /service is the canonical service dir: it matches sv's compiled-in default, so
# bare `sv <name>` resolves with no env for every caller (shell, doas, ansible).
# Stage 2/3 (overridden above) watch /service, so /etc/service is never read.
# The runit ebuild's pkg_postinst creates /etc/service and enables getties there
# (an untracked action), so drop that dir — we enable everything into /service
# ourselves below. A later `emerge sys-process/runit` may recreate a stray,
# unwatched /etc/service; that is harmless, runit never looks at it.
- name: ensure /service exists (canonical runit service dir)
  file:
    path: "{{ chroot_dir }}/service"
    state: directory
    mode: "0755"

- name: drop the runit ebuild's unused /etc/service dir
  file:
    path: "{{ chroot_dir }}/etc/service"
    state: absent

- name: enable services
  file:
    src: "/etc/sv/{{ item }}"
    dest: "{{ chroot_dir }}/service/{{ item }}"
    state: link
    force: yes
  loop: "{{ runit_services + network_services }}"
  vars:
    network_services: "{{ ['dbus', 'NetworkManager'] if network_stack == 'networkmanager' else ['dhcpcd'] }}"

# The runit package enables getty-tty1..6 into /etc/service at emerge; we removed
# that dir above, so re-enable them into /service ourselves. Keep this list in
# sync with the getty-tty run-script overrides earlier in this file.
- name: enable getty-tty1..6
  file:
    src: "/etc/sv/getty-tty{{ item }}"
    dest: "{{ chroot_dir }}/service/getty-tty{{ item }}"
    state: link
    force: yes
  loop: [1, 2, 3, 4, 5, 6]

#############################################
# move over services files
#############################################
- name: check /usr/local/sbin exists
  file:
    path: "{{ chroot_dir }}/usr/local/sbin"
    state: directory
    mode: "0755"

- name: install shutdown wrappers
  copy:
    src: "runit/shutdown/{{ item }}"
    dest: "{{ chroot_dir }}/usr/local/sbin/{{ item }}"
    mode: "0755"
  loop:
    - halt
    - poweroff
    - reboot
    - shutdown

#############################################
# sshd hardening
#############################################
- name: Harden sshd_config
  lineinfile:
    path: "{{ chroot_dir }}/etc/ssh/sshd_config"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: '^#?PermitRootLogin',             line: 'PermitRootLogin prohibit-password' }
    - { regexp: '^#?PasswordAuthentication',      line: 'PasswordAuthentication no' }
    - { regexp: '^#?KbdInteractiveAuthentication', line: 'KbdInteractiveAuthentication no' }
  loop_control:
    label: "{{ item.line }}"
