# host-only Intel microcode: iucode_tool --scan-system installs ONLY the running
# CPU's signature (~28M GenuineIntel.bin -> a few KB). dracut early_microcode then
# bundles just that into the UKI. The install chroot runs on the same CPU, so -S
# resolves correctly. (rationale in CLAUDE.md)
MICROCODE_SIGNATURES="-S"
