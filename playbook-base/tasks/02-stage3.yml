---
################################################################ 
# find, download, extract then delete the stage3 desktop tarball
################################################################ 
- name: get stage3 tarball filename
  shell: |
    set -o pipefail
    curl -fsSL "{{ gentoo_mirror }}/{{ stage3_pointer }}" \
      | grep -Eo 'stage3-[A-Za-z0-9._-]+\.tar\.xz' \
      | head -1
  args:
    executable: /bin/bash
  register: stage3_relpath_cmd
  changed_when: false

- name: stop if file did not resolve a tarball path
  fail:
  when: stage3_relpath_cmd.stdout | trim == ''

- name: assemble stage3 download URL
  set_fact:
    stage3_filename: "{{ stage3_relpath_cmd.stdout | trim }}"
    stage3_url: "{{ gentoo_mirror }}/{{ stage3_pointer | dirname }}/{{ stage3_relpath_cmd.stdout | trim }}"

- name: download stage3 tarball
  get_url:
    url: "{{ stage3_url }}"
    dest: "{{ chroot_dir }}/{{ stage3_filename }}"
    mode: "0644"

- name: extract stage3 tarball
  command: >
    tar xpf {{ stage3_filename }}
    --xattrs-include='*.*'
    --numeric-owner
    -C {{ chroot_dir }}
  args:
    chdir: "{{ chroot_dir }}"
    creates: "{{ chroot_dir }}/etc/gentoo-release"

- name: delete stage3 tarball
  file:
    path: "{{ chroot_dir }}/{{ stage3_filename }}"
    state: absent
