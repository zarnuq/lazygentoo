---
###############################################################
# nix is installed via sys-apps/nix (BAKED, from nix-guix-gentoo)
# — no upstream curl|sh installer. This task only layers on the
# nix.conf tweaks, the runit daemon, and the per-user
# home-manager setup (channels + install + switch).
#
# Paths verified against sys-apps/nix: daemon at
# /nix/var/nix/profiles/default/bin/nix-daemon (the baked runit sv
# already targets it), profile script at
# /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh. The
# ebuild also ships /etc/profile.d/nix.sh (USE=etc-profile) that
# auto-sources for login shells, so the zshenv line below is a
# fallback for the USE=-etc-profile case.
###############################################################
- name: configure /etc/nix/nix.conf
  blockinfile:
    path: /etc/nix/nix.conf
    create: yes
    mode: "0644"
    marker: "# {mark} ANSIBLE-MANAGED nix settings"
    block: |
      experimental-features = nix-command flakes
      trusted-users = root {{ user_name }}
      sandbox = true
      auto-optimise-store = true

#####################
# nix runit service #
#####################
- name: enable nix-daemon
  file:
    src: /etc/sv/nix-daemon
    dest: /service/nix-daemon
    state: link
    follow: false
    force: yes

- name: start nix-daemon
  shell: |
    if [ "$(cat /proc/1/comm)" = "runit" ]; then
      # runsvdir rescans /service every ~5s; wait for runsv before sv up
      for _ in $(seq 1 15); do
        [ -e /service/nix-daemon/supervise/ok ] && break; sleep 1
      done
      sv -w 30 up nix-daemon
    else
      echo "not running runit as PID 1; nix-daemon will start on next runit boot"
    fi
  register: nix_daemon_start

- name: wait for nix-daemon socket
  wait_for:
    path: /nix/var/nix/daemon-socket/socket
    timeout: 30
  when: "'not running runit' not in (nix_daemon_start.stdout | default(''))"

- name: source nix profile
  lineinfile:
    path: /etc/zsh/zshenv
    regexp: '\. .*/nix-daemon\.sh$'
    line: '[ -e /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh ] && . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh'
    create: yes
    mode: "0644"

#######################
# home-manger install #
#######################
- name: add nixpkgs channel
  shell: |
    . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
    export NIX_REMOTE=daemon
    nix-channel --add https://nixos.org/channels/{{ nix_channel }} nixpkgs
  args:
    creates: "/home/{{ user_name }}/.nix-defexpr/channels/nixpkgs"
  become_user: "{{ user_name }}"

- name: add home-manager channel
  shell: |
    . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
    export NIX_REMOTE=daemon
    nix-channel --add https://github.com/nix-community/home-manager/archive/{{ home_manager_branch }}.tar.gz home-manager
  args:
    creates: "/home/{{ user_name }}/.nix-defexpr/channels/home-manager"
  become_user: "{{ user_name }}"

- name: update nix channels
  shell: |
    . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
    export NIX_REMOTE=daemon
    nix-channel --update
  become_user: "{{ user_name }}"

- name: install home-manager
  shell: |
    . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
    export NIX_REMOTE=daemon
    nix-shell '<home-manager>' -A install
  args:
    creates: "/home/{{ user_name }}/.nix-profile/bin/home-manager"
  become_user: "{{ user_name }}"

######################
# home-manger update #
######################
- name: home-manager switch
  shell: |
    . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
    export NIX_REMOTE=daemon
    home-manager switch
  become_user: "{{ user_name }}"
