---
#########################################
# set portage conf, overides, repos, profiles, etc
#########################################
- name: write make.conf
  template:
    src: make.conf.j2
    dest: "{{ chroot_dir }}/etc/portage/make.conf"
    owner: root
    group: root
    mode: "0644"

- name: check portage config dirs exist
  file:
    path: "{{ chroot_dir }}/etc/portage/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - package.use
    - package.accept_keywords
    - package.license
    - repos.conf

- name: config gentoo repo (rsync)
  copy:
    src: portage/repos.conf/gentoo.conf
    dest: "{{ chroot_dir }}/etc/portage/repos.conf/gentoo.conf"
    mode: "0644"

- name: pull initial portage tree
  command: chroot {{ chroot_dir }} /bin/bash -lc "emerge-webrsync"
  args:
    creates: "{{ chroot_dir }}/var/db/repos/gentoo/profiles/repo_name"

- name: select profile
  command: chroot {{ chroot_dir }} /bin/bash -lc "eselect profile set {{ gentoo_profile }}"
  register: profile_set
  changed_when: "'now set' in profile_set.stdout or 'set to' in profile_set.stdout"

- name: install cpuid2cpuflags (for accurate CPU_FLAGS_X86)
  command: chroot {{ chroot_dir }} /bin/bash -lc "emerge --quiet-build app-portage/cpuid2cpuflags"
  args:
    creates: "{{ chroot_dir }}/usr/bin/cpuid2cpuflags"

- name: detect CPU flags
  command: chroot {{ chroot_dir }} /bin/bash -lc "cpuid2cpuflags"
  register: cpuid_out
  changed_when: false

- name: append CPU_FLAGS_X86 to make.conf
  lineinfile:
    path: "{{ chroot_dir }}/etc/portage/make.conf"
    regexp: '^CPU_FLAGS_X86='
    line: "CPU_FLAGS_X86=\"{{ cpuid_out.stdout.split(': ')[1] | default('') }}\""
    state: present

- name: add package USE overrides
  copy:
    src: portage/package.use/
    dest: "{{ chroot_dir }}/etc/portage/package.use/"
    mode: "0644"

#########################################
# world update with new compiler flags
#########################################
- name: update @world to use new profile/USE flags
  command: chroot {{ chroot_dir }} /bin/bash -lc "emerge --quiet-build --update --deep --newuse --with-bdeps=y @world"
  async: 14400
  poll: 30
