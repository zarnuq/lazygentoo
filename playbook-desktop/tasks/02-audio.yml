---
###############################################
# mpd data dir. The PipeWire stack (pipewire/wireplumber/pavucontrol) and pweq
# (media-sound/pweq -> /usr/bin/pweq) are BAKED into the stage4, so nothing to
# install or stow here anymore.
###############################################
- name: create mpd data directory
  file:
    path: "/home/{{ user_name }}/.local/share/mpd"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"
