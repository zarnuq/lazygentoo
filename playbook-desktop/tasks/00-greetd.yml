---
###########################################################
# greetd host tweaks — install/config/enable are all BAKED #
# into the stage4 (gui-libs/greetd + gui-apps/tuigreet,    #
# /etc/greetd/config.toml, /service/greetd). Only the      #
# runtime + host-specific bits remain here.                #
###########################################################
- name: write NVIDIA Wayland env vars (NVIDIA GPU only)
  blockinfile:
    path: /etc/environment
    create: true
    marker: "# {mark} NVIDIA WAYLAND"
    block: |
      GBM_BACKEND=nvidia-drm
      __GLX_VENDOR_LIBRARY_NAME=nvidia
      WLR_NO_HARDWARE_CURSORS=1
  when: "'nvidia' in video_cards"
