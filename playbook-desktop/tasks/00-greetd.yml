---
###########################################################
# greetd host tweaks — install/config/enable are all BAKED #
# into the stage4 (gui-libs/greetd + gui-apps/tuigreet,    #
# /etc/greetd/config.toml, /service/greetd). Only the      #
# runtime + host-specific bits remain here.                #
###########################################################

- name: add greetd user to groups (seat/tty/input for session launch)
  command: gpasswd -a greetd {{ item }}
  loop:
    - seat
    - tty
    - input
  register: greetd_groups
  changed_when: "'Adding user' in (greetd_groups.stdout | default(''))"

- name: ensure tuigreet cache dir exists (--remember)
  file:
    path: /var/cache/tuigreet
    state: directory
    mode: "0755"

- name: chown tuigreet cache dir
  command: chown greetd:greetd /var/cache/tuigreet
  changed_when: false

# river/wlroots needs GBM backend + GLVND dispatch + SW cursor on NVIDIA (KMS has
# no HW cursor planes). greetd reads /etc/environment via pam_env before launching
# the session, so these reach the WM without a login shell. Host-specific (NVIDIA),
# so it can't be baked into a shared image.
- name: write NVIDIA Wayland env vars (NVIDIA GPU only)
  blockinfile:
    path: /etc/environment
    create: true
    marker: "# {mark} NVIDIA WAYLAND"
    block: |
      GBM_BACKEND=nvidia-drm
      __GLX_VENDOR_LIBRARY_NAME=nvidia
      WLR_NO_HARDWARE_CURSORS=1
  when: "'nvidia' in video_cards"
