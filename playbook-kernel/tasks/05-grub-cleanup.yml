---
##############################
# remove GRUB once UKI works #
##############################

- name: mask grub
  copy:
    dest: /etc/portage/package.mask/no-grub
    mode: "0644"
    content: "sys-boot/grub\n"

- name: unmerge grub
  command: emerge --quiet --unmerge sys-boot/grub
  register: unmerge
  changed_when: "'>>> Unmerging' in unmerge.stdout"
  failed_when: false   # OK if not installed

- name: remove grub leftovers
  file: { path: "{{ item }}", state: absent }
  loop:
    - /boot/grub
    - /boot/EFI/Gentoo

- name: find grub efibootmgr entry
  shell: |
    efibootmgr | awk '
      /^Boot[0-9A-F][0-9A-F][0-9A-F][0-9A-F]/ && index($0, "\\EFI\\Gentoo\\grubx64.efi") > 0 {
        sub(/^Boot/, ""); sub(/[* \t].*/, ""); print; exit
      }'
  register: grub_id
  changed_when: false

- name: delete grub efibootmgr entry
  command: efibootmgr -b {{ grub_id.stdout }} -B --quiet
  when: grub_id.stdout | length > 0
