---
###############################
# install secure boot toolchain #
###############################

- name: install eselect-repository
  command: emerge --quiet-build --noreplace app-eselect/eselect-repository

- name: check if guru is enabled
  shell: eselect repository list -i | grep -q guru
  register: guru_check
  failed_when: false
  changed_when: false

- name: sync guru
  shell: eselect repository enable guru && emaint sync -r guru
  when: guru_check.rc != 0

- name: install sbctl
  command: emerge --quiet-build --noreplace app-crypt/sbctl

# ukify (via kernel-install) verifies the kernel's signature with `sbverify`
# before signing the UKI; that binary ships in sbsigntools. sbctl does its own
# Go signing and does NOT pull this in, so without it 04-sign dies on
# "Tool sbverify not installed!".
- name: install sbsigntools (provides sbverify/sbsign for ukify)
  command: emerge --quiet-build --noreplace app-crypt/sbsigntools

- name: ensure package.accept_keywords dir
  file: { path: /etc/portage/package.accept_keywords, state: directory, mode: "0755" }
  when: tpm_unlock | bool

- name: keyword clevis < 20 (guru masks 20/21 for dracut boot breakage)
  copy:
    dest: /etc/portage/package.accept_keywords/clevis
    mode: "0644"
    content: "<app-crypt/clevis-20 ~amd64\n"
  when: tpm_unlock | bool

- name: install clevis + tpm2 tooling (tpm_unlock=true)
  command: >
    emerge --quiet-build --noreplace
    --autounmask --autounmask-keep-keywords=n --autounmask-write --autounmask-continue
    app-crypt/clevis app-crypt/tpm2-tools app-crypt/tpm2-tss
  when: tpm_unlock | bool

# Force the clevis dracut module into the initramfs. Without this, the LUKS
# header's TPM keyslot exists but the boot image has no code to read it, so the
# box always falls through to the passphrase prompt. We add it EXPLICITLY rather
# than rely on dracut's hostonly autodetect (which only includes clevis if a
# binding already exists at UKI-build time -- false on a fresh install, since the
# bind happens later in 03-tpm.yml). 04-sign rebuilds the UKI with this module in
# (pre-reboot) and every future kernel-install keeps it -- the TPM binding lives
# in the LUKS header (read at boot), not the initramfs, so no post-bind rebuild.
- name: force the clevis dracut module into the UKI (tpm_unlock=true)
  copy:
    dest: /etc/dracut.conf.d/clevis.conf
    mode: "0644"
    content: 'add_dracutmodules+=" clevis "'
  when: tpm_unlock | bool
