---
######################################
# generate + enroll secure boot keys #
######################################

- name: locate sbctl keys dir (sbctl >=0.11 uses /var/lib/sbctl)
  shell: |
    for d in /var/lib/sbctl/keys /usr/share/secureboot/keys; do
      [ -d "$d" ] && { echo "$d"; exit 0; }
    done
    echo /var/lib/sbctl/keys
  register: sb_keys_dir
  changed_when: false

- name: generate sbctl keys (first run)
  command: sbctl create-keys
  args:
    creates: "{{ sb_keys_dir.stdout }}/db/db.key"

- name: set sbctl db key/cert paths for signing
  set_fact:
    sb_db_key: "{{ sb_keys_dir.stdout }}/db/db.key"
    sb_db_cert: "{{ sb_keys_dir.stdout }}/db/db.pem"

- command: sbctl status --json
  register: sb_status
  changed_when: false

# Gate enrollment on setup_mode, NOT sbctl's `installed`. `installed` only means
# "sbctl generated local keys" (true as soon as create-keys ran) -- it is NOT
# "keys enrolled in firmware". setup_mode=true <=> no PK enrolled <=> enroll now;
# setup_mode=false <=> keys already enrolled <=> skip. Keying on `installed` here
# silently skipped enrollment on every run, so firmware keys never got enrolled.
- name: enroll Secure Boot keys (firmware in setup mode; keeps Microsoft keys)
  when: (sb_status.stdout | from_json).setup_mode | bool
  command: sbctl enroll-keys -m
