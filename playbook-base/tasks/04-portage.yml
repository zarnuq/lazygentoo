---
#########################################
# The stage4 tarball bakes the entire portage config: global make.conf
# (COMMON_FLAGS, USE, ABI, CPU_FLAGS baseline), profile, package.use,
# package.env, env/, package.accept_keywords, package.mask, the overlay
# repos.conf, AND the full @world. So this task only:
#   1. appends the per-host make.conf overrides
#   2. ensures ::gentoo is defined + syncs an ebuild tree (stages ship none)
#########################################
# make.conf is sourced top-down, so appended host values win over the baked
# defaults (MAKEOPTS, VIDEO_CARDS, microcode INSTALL_MASK, runtime paths).
- name: assert stage4 baked make.conf is present
  stat:
    path: "{{ chroot_dir }}/etc/portage/make.conf"
  register: baked_makeconf

- name: fail if baked make.conf missing (personalized stage4 tarball expected)
  fail:
    msg: >-
      No /etc/portage/make.conf in the extracted stage. This playbook now expects
      the personalized stage4 tarball to provide the global make.conf. Check that
      tasks/02-stage3.yml extracted the stage4 build, not a bare upstream stage3.
  when: not baked_makeconf.stat.exists

- name: append host-specific make.conf overrides
  blockinfile:
    path: "{{ chroot_dir }}/etc/portage/make.conf"
    marker: "# {mark} LAZYGENTOO HOST OVERRIDES"
    block: "{{ lookup('template', 'make.conf.host.j2') }}"
    owner: root
    group: root
    mode: "0644"

# The stage4 now ships ALL repos.conf (::gentoo hardened config + the overlays),
# but catalyst stages carry NO ebuild repo — so we still sync a tree here.
- name: pull initial portage tree
  command: '{{ in_chroot }} "emerge-webrsync"'
  args:
    creates: "{{ chroot_dir }}/var/db/repos/gentoo/profiles/repo_name"

# NOTE: profile selection, package.use/env, CPU_FLAGS detection, the binhost
# toolchain pull, and the full @world build were all REMOVED here — they're
# baked into the stage4. Re-running @world at install would recompile against
# any tree drift since the bake and defeat the whole point. CPU_FLAGS stays at
# the baked v3 intersection on purpose (re-detecting a fuller set would trigger
# rebuilds). To pick up updates later, run manually: `emerge -uDN @world`.
