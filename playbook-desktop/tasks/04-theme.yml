---
###################################################
# Fonts, themes, icons, and cursors are now VENDORED in the dotfiles (stowed by
# 01-dotfiles into ~/.local/share/{fonts,themes,icons} and ~/.config/Kvantum),
# so the old GitHub-download tasks are gone. This task only rebuilds the caches
# those stowed assets need, then pulls wallpapers (the one asset NOT in dotfiles).
###################################################

# Stowed fonts/icons ship without caches (icon-theme.cache is gitignored), so
# rebuild them after 01-dotfiles has laid the assets down.
- name: refresh font cache
  command: fc-cache -f
  become_user: "{{ user_name }}"

- name: rebuild icon-theme caches for stowed icon themes
  command: "gtk-update-icon-cache -f -t /home/{{ user_name }}/.local/share/icons/{{ item }}"
  loop:
    - Papirus
    - Papirus-Dark
  become_user: "{{ user_name }}"
  failed_when: false   # skip cleanly if a theme dir isn't present

# Wallpapers are the only theming asset NOT vendored in dotfiles.
- name: clone wallpapers repo to ~/Pictures/bgs
  git:
    repo: "{{ wallpapers_repo }}"
    dest: "/home/{{ user_name }}/Pictures/bgs"
    version: "{{ wallpapers_branch }}"
    depth: 1
    update: yes
  become_user: "{{ user_name }}"
