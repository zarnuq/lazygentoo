---
########################################
# emerge gentoo-kernel-bin + build UKI #
########################################

- name: emerge gentoo-kernel-bin
  command: emerge --quiet-build --update --newuse sys-kernel/gentoo-kernel-bin
  async: 3600
  poll: 30

- name: detect KVER + image path
  shell: |
    kver=$(ls /lib/modules | sort -V | tail -n1)
    printf '%s\n/boot/vmlinuz-%s\n' "$kver" "$kver"
  register: kp
  changed_when: false

- set_fact:
    kver: "{{ kp.stdout_lines[0] }}"
    kernel_image_path: "{{ kp.stdout_lines[1] }}"

- name: check kernel image exists
  stat: { path: "{{ kernel_image_path }}" }
  register: kimg
  failed_when: not kimg.stat.exists

- name: start kernel-install hook chain
  command: kernel-install add {{ kver }} {{ kernel_image_path }}
