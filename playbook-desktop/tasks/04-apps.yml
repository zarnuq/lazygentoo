---
###############################
# manage and install overlays #
###############################
- name: install eselect-repository
  command: emerge --quiet-build --noreplace app-eselect/eselect-repository

- name: enable the ::guru
  command: eselect repository enable guru
  register: guru_enable
  changed_when: "'Overlay \"guru\" already enabled' not in (guru_enable.stderr | default(''))"
  failed_when:
    - guru_enable.rc != 0
    - "'already enabled' not in (guru_enable.stderr | default(''))"

- name: sync the ::guru overlay
  command: emaint sync -r guru

- name: accept ~amd64 keywords for anything in ::guru
  copy:
    src: portage/package.accept_keywords/guru
    dest: /etc/portage/package.accept_keywords/guru
    mode: "0644"

- name: register the ::edgets
  copy:
    src: portage/repos.conf/edgets.conf
    dest: /etc/portage/repos.conf/edgets.conf
    mode: "0644"

- name: sync the ::edgets
  command: emaint sync -r edgets

- name: accept ~amd64 keywords for each apps_packages atom
  copy:
    dest: /etc/portage/package.accept_keywords/apps
    mode: "0644"
    content: |
      {% for pkg in apps_packages %}
      {{ pkg }} ~amd64
      {% endfor %}

- name: install desktop apps
  command: >
    emerge --quiet-build --noreplace --keep-going=y
    --autounmask=y --autounmask-write=y --autounmask-continue=y
    --autounmask-license=y
    {{ apps_packages | join(' ') }}
  async: 14400
  poll: 30

- name: restart greetd
  shell: |
    [ "$(cat /proc/1/comm)" = "runit" ] && sv restart greetd || \
    echo "not running runit as PID 1; greetd will start on next runit boot"
