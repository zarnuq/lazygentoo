---
########################################
# checks, cmdline auto-assembly #
########################################

- name: check its gentoo, UEFI, efivarfs mounted
  shell: |
    set -e
    [ -f /etc/gentoo-release ] || { echo "not Gentoo"; exit 1; }
    [ -d /sys/firmware/efi ]   || { echo "not UEFI-booted"; exit 1; }
    mountpoint -q /sys/firmware/efi/efivars
  changed_when: false

- name: Probe disk + init layout
  shell: |
    set -e
    src=$(findmnt -no SOURCE /)
    uuid=$(findmnt -no UUID /)
    fstype=$(findmnt -no FSTYPE /)
    luks_dev=""; luks_uuid=""
    case "$src" in
      /dev/mapper/*)
        luks_dev=$(cryptsetup status "${src##*/}" | awk '/device:/{print $2}')
        luks_uuid=$(blkid -s UUID -o value "$luks_dev")
        ;;
    esac
    has_runit="false"
    [ -x /usr/bin/runit-init ] && has_runit="true"
    printf '%s\n%s\n%s\n%s\n%s\n' "$uuid" "$fstype" "$luks_dev" "$luks_uuid" "$has_runit"
  register: probe
  changed_when: false

- set_fact:
    _p: "{{ probe.stdout_lines }}"
- set_fact:
    root_cmdline: >-
      {{ ('rd.luks.uuid=' ~ _p[3] ~ ' ') if _p[2] | length > 0 else '' }}root=UUID={{ _p[0] }} rootfstype={{ _p[1] }} rw{{ ' init=/usr/bin/runit-init' if _p[4] == 'true' else '' }} {{ extra_cmdline }}
    luks_detected: "{{ _p[2] | length > 0 }}"
