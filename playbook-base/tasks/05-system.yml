---
#########################################
# set locale, keymaps, hostname, hosts
#########################################
- name: symlink /etc/localtime to the configured zoneinfo file
  file:
    src: "../usr/share/zoneinfo/{{ timezone }}"
    dest: "{{ chroot_dir }}/etc/localtime"
    state: link
    follow: false
    force: yes

- name: write /etc/locale.gen
  copy:
    dest: "{{ chroot_dir }}/etc/locale.gen"
    mode: "0644"
    content: |
      {% for l in locales %}
      {{ l }}
      {% endfor %}

- name: generate locales
  command: '{{ in_chroot }} "locale-gen"'
- name: set locale
  command: '{{ in_chroot }} "eselect locale set {{ default_locale }}"'
- name: set keymap
  lineinfile:
    path: "{{ chroot_dir }}/etc/conf.d/keymaps"
    regexp: '^keymap='
    line: 'keymap="{{ keymap }}"'
    create: yes
    mode: "0644"

- name: set hostname
  copy:
    dest: "{{ chroot_dir }}/etc/conf.d/hostname"
    mode: "0644"
    content: |
      hostname="{{ hostname }}"

- name: write /etc/hosts
  copy:
    dest: "{{ chroot_dir }}/etc/hosts"
    mode: "0644"
    content: |
      127.0.0.1   localhost {{ hostname }}
      ::1         localhost {{ hostname }}


#########################################
# write filesystem tables
#########################################
- name: write /etc/fstab
  template:
    src: fstab.j2
    dest: "{{ chroot_dir }}/etc/fstab"
    mode: "0644"

- name: write /etc/crypttab (encrypt_swap=true)
  copy:
    dest: "{{ chroot_dir }}/etc/crypttab"
    mode: "0644"
    content: |
      # <name>  <device>           <key file>     <options>
      swap      {{ swap_part }}    /dev/urandom   swap,cipher=aes-xts-plain64,size=256
  when:
    - fde_enable | bool
    - encrypt_swap | bool
    - swap_size_mib | int > 0

#########################################
# kernel sysctl tunables
#########################################
# overcommit_memory=1 (always overcommit): the default heuristic (0) refuses a
# single huge malloc *before* swap is consulted, which aborts memory-heavy
# source builds with std::bad_alloc even when swap is free. The classic victim
# is dev-lang/zig (the ~50-60 GB single zig2.c translation unit). Mode 1 lets
# the allocation through and spills overflow to swap. Tradeoff: genuine
# RAM+swap exhaustion now triggers the OOM killer instead of a clean failure.
# Applied at boot by the runit rc/1.08-sysctl.sh script (scans /etc/sysctl.d).
- name: write /etc/sysctl.d/99-overcommit.conf (allow overcommit for big builds)
  copy:
    dest: "{{ chroot_dir }}/etc/sysctl.d/99-overcommit.conf"
    mode: "0644"
    content: |
      # Always overcommit so large single allocations (e.g. compiling
      # dev-lang/zig's zig2.c) succeed and spill to swap instead of
      # aborting with std::bad_alloc under vm.overcommit_memory=0.
      vm.overcommit_memory = 1

#########################################
# root password set
#########################################
- name: set root password
  command: >
    {{ in_chroot }}
    "echo 'root:{{ root_password }}' | chpasswd"
  no_log: true
