---
##############################
# host firewall (nftables)   #
##############################
# Minimal nftables firewall: one inet table (IPv4+IPv6), default-deny inbound,
# allowing established/related + loopback + ICMP + the ports from config.yml
# (firewall_allowed_{tcp,udp}_ports). Replaces ufw -- no daemon, no enable-state
# file, atomic `nft -f` loads. The nftables runit service re-applies it on boot.
- name: load nf_tables + conntrack modules (avoid first-load race)
  command: "modprobe {{ item }}"
  loop:
    - nf_tables
    - nf_conntrack
  changed_when: false
  failed_when: false

- name: render /etc/nftables.conf
  template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    mode: "0644"
    validate: "/usr/sbin/nft -c -f %s"
  register: nft_conf

- name: load the ruleset now (atomic)
  command: /usr/sbin/nft -f /etc/nftables.conf
  changed_when: nft_conf is changed

- name: ensure nftables log dir exists
  file:
    path: /var/log/runit/nftables
    state: directory
    mode: "0755"

- name: enable nftables as a runit service (symlink into /service)
  file:
    src: /etc/sv/nftables
    dest: /service/nftables
    state: link
    follow: false
    force: yes

# Restart so the service re-reads /etc/nftables.conf when its config changed.
# `sv` resolves the bare name via /service (sv's compiled-in default dir).
- name: (re)start nftables service when runit is PID 1
  shell: |
    if [ "$(cat /proc/1/comm)" = "runit" ]; then
      sv -w 10 restart nftables
    else
      echo "not running runit as PID 1; nftables loads on next runit boot"
    fi
  changed_when: false
