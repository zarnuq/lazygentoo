# Official Gentoo amd64 binary package host. emerge prefers binpkgs whose USE
# matches yours (--binpkg-respect-use, default on) and silently falls back to
# source otherwise — so the toolchain (gcc/llvm/clang/rust/go) lands prebuilt
# while your custom-USE desktop pkgs still compile -march=native.
# Swap x86-64 -> x86-64-v3 for AVX2/FMA-baseline binpkgs if the CPU supports it.
[binhost]
priority = 9999
sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64/
