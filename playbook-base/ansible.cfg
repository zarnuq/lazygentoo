[defaults]
host_key_checking = False
retry_files_enabled = False
forks = 4
timeout = 120
stdout_callback = ansible.builtin.default
result_format = yaml
inventory = ./inventory.ini
# use ansible_facts['x'], not ansible_x (silences deprecation)
inject_facts_as_vars = False
# don't warn about the discovered python interpreter
interpreter_python = auto_silent

[ssh_connection]
pipelining = True
