---
#########################################
# set portage conf, overides, repos, profiles, etc
#########################################
- name: write make.conf
  template:
    src: make.conf.j2
    dest: "{{ chroot_dir }}/etc/portage/make.conf"
    owner: root
    group: root
    mode: "0644"

- name: check portage config dirs exist
  file:
    path: "{{ chroot_dir }}/etc/portage/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - package.use
    - package.accept_keywords
    - package.license
    - repos.conf
    - binrepos.conf

- name: config gentoo repo (rsync)
  copy:
    src: portage/repos.conf/gentoo.conf
    dest: "{{ chroot_dir }}/etc/portage/repos.conf/gentoo.conf"
    mode: "0644"

- name: config gentoo binary package host
  copy:
    src: portage/binrepos.conf/gentoobinhost.conf
    dest: "{{ chroot_dir }}/etc/portage/binrepos.conf/gentoobinhost.conf"
    mode: "0644"

- name: pull initial portage tree
  command: '{{ in_chroot }} "emerge-webrsync"'
  args:
    creates: "{{ chroot_dir }}/var/db/repos/gentoo/profiles/repo_name"

- name: select profile
  command: '{{ in_chroot }} "eselect profile set {{ gentoo_profile }}"'
  register: profile_set
  changed_when: "'now set' in profile_set.stdout or 'set to' in profile_set.stdout"

# binpkg-request-signature (set in make.conf FEATURES) verifies binhost packages
# against Gentoo's release keys. getuto builds the portage trust keyring from
# sec-keys/openpgp-keys-gentoo-release (shipped in stage3). Must run BEFORE any
# emerge that touches the binhost. Emerge getuto itself from source (binhost not
# yet trusted) by disabling the binpkg FEATURES for this one call.
- name: install getuto (binhost signature trust helper)
  command: '{{ in_chroot }} "FEATURES=''-getbinpkg -binpkg-request-signature'' emerge --quiet-build --noreplace app-portage/getuto"'
  args:
    creates: "{{ chroot_dir }}/usr/bin/getuto"

- name: build gentoo binhost signature trust keyring
  command: '{{ in_chroot }} "getuto"'
  args:
    creates: "{{ chroot_dir }}/etc/portage/gnupg"

- name: install cpuid2cpuflags (for accurate CPU_FLAGS_X86)
  command: '{{ in_chroot }} "emerge --quiet-build app-portage/cpuid2cpuflags"'
  args:
    creates: "{{ chroot_dir }}/usr/bin/cpuid2cpuflags"

- name: detect CPU flags
  command: '{{ in_chroot }} "cpuid2cpuflags"'
  register: cpuid_out
  changed_when: false

- name: append CPU_FLAGS_X86 to make.conf
  lineinfile:
    path: "{{ chroot_dir }}/etc/portage/make.conf"
    regexp: '^CPU_FLAGS_X86='
    line: "CPU_FLAGS_X86=\"{{ cpuid_out.stdout.split(': ')[1] | default('') }}\""
    state: present

- name: add package USE overrides
  copy:
    src: portage/package.use/
    dest: "{{ chroot_dir }}/etc/portage/package.use/"
    mode: "0644"

#########################################
# world update with new compiler flags
#########################################
- name: update @world to use new profile/USE flags
  command: '{{ in_chroot }} "emerge --quiet-build --update --deep --newuse --with-bdeps=y @world"'
  async: 14400
  poll: 30
