---
#############################################
# user creation, add auth_keys file, add to wheel,
#############################################
- name: create and configure user (create_user=true)
  when: create_user
  block:
    - name: create user
      command: >
        {{ in_chroot }}
        "id {{ user_name }} >/dev/null 2>&1 ||
         useradd -m -G {{ user_groups | join(',') }} -s {{ user_shell }} {{ user_name }}"

    - name: set user password
      command: >
        {{ in_chroot }}
        "echo '{{ user_name }}:{{ user_password }}' | chpasswd"
      no_log: true

    - name: allow wheel via doas (password for general use, nopass for power)
      copy:
        src: doas.conf
        dest: "{{ chroot_dir }}/etc/doas.conf"
        owner: root
        group: root
        mode: "0400"

    - name: check for an authorized_keys file (files/authorized_keys, gitignored)
      stat:
        path: "{{ playbook_dir }}/files/authorized_keys"
      delegate_to: localhost
      become: no
      register: authkeys_file

    - name: move authorized_keys for user
      when: authkeys_file.stat.exists
      block:
        - name: Make ~/.ssh
          file:
            path: "{{ chroot_dir }}/home/{{ user_name }}/.ssh"
            state: directory
            mode: "0700"
        - name: write authorized_keys
          copy:
            src: authorized_keys
            dest: "{{ chroot_dir }}/home/{{ user_name }}/.ssh/authorized_keys"
            mode: "0600"
        - name: chown user ssh dir
          command: >
            {{ in_chroot }}
            "chown -R {{ user_name }}:{{ user_name }} /home/{{ user_name }}/.ssh"

#############################################
# make sudo an alias for doas via symlink
#############################################
- name: ensure /usr/local/bin exists
  file:
    path: "{{ chroot_dir }}/usr/local/bin"
    state: directory
    mode: "0755"

- name: symlink sudo -> doas so `sudo <cmd>` runs `doas <cmd>`
  file:
    src: /usr/bin/doas
    dest: "{{ chroot_dir }}/usr/local/bin/sudo"
    state: link
    follow: false
    force: yes
