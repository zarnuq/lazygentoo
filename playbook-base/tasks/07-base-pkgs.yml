---
#####################################################
# base_packages + the whole desktop stack are BAKED into the stage4.
# Only host-specific package bits remain:
#   - network daemon (baked = dhcpcd; NM emerged here only if chosen)
#   - nvidia-drivers (GPU-specific, built against THIS host's kernel)
#   - XDG_RUNTIME_DIR shell snippet
#####################################################

# Neither network daemon is baked, so the chosen one (dhcpcd OR NetworkManager)
# is installed here based on network_stack — no leftover of the unchosen daemon.
- name: install network daemon ({{ network_stack }})
  command: >
    {{ in_chroot }}
    "emerge --quiet-build --noreplace net-misc/{{ 'networkmanager' if network_stack == 'networkmanager' else 'dhcpcd' }}"

- name: disable polkit in NetworkManager
  copy:
    dest: "{{ chroot_dir }}/etc/NetworkManager/NetworkManager.conf"
    mode: "0644"
    content: |
      [main]
      auth-polkit=false
  when: network_stack == "networkmanager"

# mesa is baked with NO VIDEO_CARDS (make.conf is kept hardware-agnostic), so the
# tarball ships only the llvmpipe software rasterizer. Rebuild it against THIS
# host's VIDEO_CARDS (detected in 00-preflight, written to make.conf by
# make.conf.host.j2) so the correct hardware gallium driver (radeonsi/iris/
# nouveau) is built. The baked LLVM carries the AMDGPU backend, so a radeonsi
# build here does NOT drag a full LLVM rebuild.
- name: rebuild mesa for this host's GPU
  command: '{{ in_chroot }} "emerge --quiet-build --newuse --oneshot media-libs/mesa"'
  async: 3600
  poll: 30

# nvidia-drivers builds its kernel module against /usr/src/linux (compiled in
# 06-kernel.yml). GPU is per-host, so it can't be baked — emerge before first
# boot so the module exists for the installed kernel.
- name: install nvidia-drivers (NVIDIA GPU only)
  command: '{{ in_chroot }} "emerge --quiet-build x11-drivers/nvidia-drivers"'
  when: "'nvidia' in video_cards"
  async: 3600
  poll: 30

# NOTE: /etc/profile.d/xdg-runtime-dir.sh is now BAKED into the stage4 overlay.
