---
################################################################
# Extract the personalized catalyst stage4 tarball (bakes portage
# config, the full @world/base+desktop stack, runit, and overlays).
# Replaces the old upstream stage3 download. Source is config.yml:
# stage4_tarball — a local path on the controller, or an https:// URL.
################################################################
- name: fetch stage4 tarball (URL)
  get_url:
    url: "{{ stage4_tarball }}"
    dest: "{{ chroot_dir }}/stage4.tar.xz"
    mode: "0644"
  when: stage4_tarball is match('^https?://')

- name: copy stage4 tarball (local file on controller)
  copy:
    src: "{{ stage4_tarball }}"
    dest: "{{ chroot_dir }}/stage4.tar.xz"
    mode: "0644"
  when: not (stage4_tarball is match('^https?://'))

- name: extract stage4 tarball
  command: >
    tar xpf stage4.tar.xz
    --xattrs-include='*.*'
    --numeric-owner
    -C {{ chroot_dir }}
  args:
    chdir: "{{ chroot_dir }}"
    creates: "{{ chroot_dir }}/etc/gentoo-release"

- name: delete stage4 tarball
  file:
    path: "{{ chroot_dir }}/stage4.tar.xz"
    state: absent
