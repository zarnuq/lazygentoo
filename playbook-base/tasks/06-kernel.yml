---
############################################
# install bin kernel + initramfs, build a UKI, register it with efibootmgr, and microcodes
############################################
- name: check UEFI
  stat:
    path: /sys/firmware/efi
  register: efi_present

- name: fail if not UEFI
  fail:
  when: not efi_present.stat.exists

- name: create /etc/kernel/install.d + /etc/dracut.conf.d in chroot
  file:
    path: "{{ chroot_dir }}{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /etc/kernel/install.d
    - /etc/dracut.conf.d

- name: make root kernel cmdline
  set_fact:
    root_cmdline: >-
      {{ ('rd.luks.uuid=' ~ luks_uuid ~ ' ') if fde_enable else '' }}root=UUID={{ root_uuid }} rootfstype={{ root_fs }} rw quiet loglevel=3 preempt=full init=/usr/bin/runit-init{{ ' nvidia-drm.modeset=1' if 'nvidia' in video_cards else '' }}

- name: write kernel cmdline
  copy:
    dest: "{{ chroot_dir }}/etc/kernel/cmdline"
    mode: "0644"
    content: "{{ root_cmdline | trim }}\n"

- name: write dracut cmdline
  copy:
    dest: "{{ chroot_dir }}/etc/dracut.conf.d/cmdline.conf"
    mode: "0644"
    content: "kernel_cmdline=\"{{ root_cmdline | trim }}\"\n"

- name: write dracut firmware/early-microcode config
  template:
    src: dracut-firmware.conf.j2
    dest: "{{ chroot_dir }}/etc/dracut.conf.d/firmware.conf"
    mode: "0644"

- name: write dracut lean config (hostonly + zstd + omit unused modules; runit, no systemd/network)
  copy:
    dest: "{{ chroot_dir }}/etc/dracut.conf.d/00-lean.conf"
    mode: "0644"
    content: |
      hostonly="yes"
      compress="zstd"
      # safety net so a chroot-built hostonly initramfs can always mount root: force
      # the root fs + disk controller in. Guarded by a module-check so a custom kernel
      # that builds these BUILTIN doesn't break dracut (can't force a builtin driver;
      # it's already in the kernel). Modular gentoo-kernel-bin still gets the net.
      _k="${kernel:-$(uname -r)}"
      case "$(modinfo -k "$_k" -F filename {{ root_fs }} 2>/dev/null)" in *.ko*) filesystems+=" {{ root_fs }} " ;; esac
      case "$(modinfo -k "$_k" -F filename {{ root_disk_driver }} 2>/dev/null)" in *.ko*) force_drivers+=" {{ root_disk_driver }} " ;; esac
      omit_dracutmodules+=" systemd systemd-initrd dracut-systemd systemd-ask-password network network-manager ifcfg plymouth lvm mdraid dmraid multipath nfs iscsi nbd i18n "

- name: write dracut crypt config (fde_enable=true)
  copy:
    dest: "{{ chroot_dir }}/etc/dracut.conf.d/crypt.conf"
    mode: "0644"
    content: |
      add_dracutmodules+=" crypt dm rootfs-block "
  when: fde_enable

# cryptsetup is NOT baked (LUKS-only). Install it here on FDE hosts — dracut's
# crypt module copies the cryptsetup binary into the initramfs, so it must be
# present before the UKI build below. Non-FDE hosts never get it (no leftover).
- name: install cryptsetup (FDE only)
  command: '{{ in_chroot }} "emerge --quiet-build --noreplace sys-fs/cryptsetup"'
  when: fde_enable

# NOTE: the kernel (sys-kernel/gentoo-sources, compiled with files/kernel/config
# in the stage4 fsscript), dracut, installkernel, efibootmgr, linux-firmware, and
# systemd-utils are BAKED into the stage4 tarball. cryptsetup is installed above
# only when fde_enable. Only the host-specific UKI assembly remains.

- name: install intel microcode
  command: '{{ in_chroot }} "emerge --quiet-build sys-firmware/intel-microcode"'
  when: cpu_microcode == "intel"

# NOTE: the kernel is BAKED — sys-kernel/gentoo-sources is emerged and compiled
# with files/kernel/config in the stage4 fsscript (make + INSTALL_MOD_STRIP=1
# modules_install), so the tarball ships /usr/src/linux with a built bzImage and
# /lib/modules. No compile at install; the UKI step below just assembles it.

# install.conf, uki.conf, entry-token, the two install.d hook scripts
# (95-efibootmgr-register, 96-prune-old-ukis), and the /dev/null masks for the
# systemd-microcode plugins are all STATIC and now BAKED into the stage4 overlay
# (etc/kernel/ + etc/kernel/install.d/). Only uki.env stays here — it carries the
# host/user tunables (label prefix, retention, promote-to-default).
- name: write kernel-install uki.env (host tunables; the rest is baked)
  copy:
    dest: "{{ chroot_dir }}/etc/kernel/uki.env"
    mode: "0644"
    content: "LABEL_PREFIX=\"{{ uki_label_prefix }}\"\nKEEP_N_KERNELS={{ keep_n_kernels }}\nPROMOTE_NEW_TO_DEFAULT={{ 'true' if promote_new_to_default else 'false' }}\n"

# Feed the baked bzImage from the source tree (NOT /boot) so kernel-install
# builds+registers the UKI without dropping a loose vmlinuz in /boot. dracut
# (hostonly, per 00-lean.conf above) bundles this host's microcode + drivers.
# Net: /boot holds only EFI/Linux/<token>-<kver>.efi.
- name: build + register UKI (kernel-install) from the baked source bzImage
  command: >
    {{ in_chroot }}
    "kver=$(make -s -C /usr/src/linux kernelrelease); kernel-install add \"$kver\" /usr/src/linux/arch/x86/boot/bzImage"
